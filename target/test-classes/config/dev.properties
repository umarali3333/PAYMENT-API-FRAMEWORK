# ============================================================
# DEV Environment Configuration
# ============================================================
# Usage: mvn test (default - uses dev.properties)
# Override: mvn test -Denv=staging

# API Base URL - using JSONPlaceholder for demo
# Replace with your payment gateway URL:
# e.g., https://sandbox.payment.gateway.com/api/v1
base.url=https://jsonplaceholder.typicode.com

# Auth - replace with real credentials
# In production: use environment variables or secrets manager
auth.token=Bearer dev-demo-token-replace-with-real-jwt

# API Key - replace with real key from your gateway portal
api.key=dev-api-key-replace-with-real-key

# Timeouts (milliseconds)
timeout.connect=10000
timeout.read=30000

# SLA thresholds
max.response.time.ms=5000
